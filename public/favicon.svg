<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#07080b"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="7.5" stroke="#262b37"/>
  <!-- constellation lines -->
  <g stroke="#38e8d4" stroke-width="0.9" stroke-opacity="0.5" stroke-linecap="round">
    <line x1="7" y1="21" x2="13" y2="12"/>
    <line x1="13" y1="12" x2="20" y2="17"/>
    <line x1="20" y1="17" x2="25" y2="8"/>
  </g>
  <!-- stars -->
  <circle cx="7" cy="21" r="1.4" fill="#dbe4f2"/>
  <circle cx="20" cy="17" r="1.4" fill="#dbe4f2"/>
  <circle cx="25" cy="8" r="1.6" fill="#dbe4f2"/>
  <circle cx="22" cy="25" r="0.9" fill="#7a8497"/>
  <circle cx="5" cy="9" r="0.9" fill="#7a8497"/>
  <!-- bright primary star (signal) with glow -->
  <circle cx="13" cy="12" r="4.5" fill="#b6f94c" fill-opacity="0.18"/>
  <circle cx="13" cy="12" r="2.4" fill="#b6f94c"/>
  <circle cx="13" cy="12" r="1" fill="#eaffd0"/>
</svg>
