<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;800&amp;family=JetBrains+Mono:wght@500&amp;display=swap');
      .display { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; font-weight: 800; letter-spacing: -3px; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; font-weight: 500; }
      .name { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; font-weight: 800; }
    </style>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0" stop-color="#b6f94c"/>
      <stop offset="0.6" stop-color="#38e8d4"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#b6f94c" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#b6f94c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#07080b"/>
  <rect x="20" y="20" width="1160" height="590" rx="20" fill="none" stroke="#181c25"/>
  <ellipse cx="320" cy="360" rx="520" ry="420" fill="url(#glow)"/>

  <!-- constellation (Cassiopeia W) top right -->
  <g stroke="#262b37" stroke-width="1.4" stroke-linecap="round">
    <line x1="905" y1="150" x2="960" y2="100"/>
    <line x1="960" y1="100" x2="1015" y2="158"/>
    <line x1="1015" y1="158" x2="1070" y2="104"/>
    <line x1="1070" y1="104" x2="1125" y2="150"/>
  </g>
  <g fill="#7a8497">
    <circle cx="905" cy="150" r="3"/>
    <circle cx="960" cy="100" r="3"/>
    <circle cx="1015" cy="158" r="3"/>
    <circle cx="1125" cy="150" r="3"/>
  </g>
  <circle cx="1070" cy="104" r="9" fill="#b6f94c" fill-opacity="0.18"/>
  <circle cx="1070" cy="104" r="4" fill="#b6f94c"/>
  <!-- scattered stars -->
  <g fill="#535c6e">
    <circle cx="1000" cy="240" r="1.6"/>
    <circle cx="880" cy="220" r="1.4"/>
    <circle cx="1140" cy="70" r="1.6"/>
    <circle cx="820" cy="120" r="1.4"/>
  </g>

  <!-- label -->
  <text x="86" y="132" class="mono" font-size="22" letter-spacing="4" fill="#b6f94c">// AI INFRASTRUCTURE · DEVELOPER TOOLS</text>

  <!-- headline -->
  <text x="82" y="262" class="display" font-size="94" fill="#f5f7fa">Building the</text>
  <text x="82" y="362" class="display" font-size="94" fill="url(#grad)">infrastructure</text>
  <text x="82" y="462" class="display" font-size="94" fill="#f5f7fa">between AI &amp; data.</text>

  <!-- footer -->
  <text x="86" y="560" class="name" font-size="28" fill="#e6eaf1">Riccardo Merenda</text>
  <text x="1114" y="560" text-anchor="end" class="mono" font-size="22" fill="#7a8497">riccardomerenda<tspan fill="#b6f94c">.dev</tspan></text>
</svg>
