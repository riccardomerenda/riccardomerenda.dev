<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#020617"/>

  <!-- Gradient orbs -->
  <circle cx="900" cy="200" r="300" fill="#4f46e5" fill-opacity="0.12" filter="blur(80px)"/>
  <circle cx="300" cy="450" r="250" fill="#06b6d4" fill-opacity="0.08" filter="blur(80px)"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.4"/>

  <!-- Content -->
  <text x="80" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#818cf8" letter-spacing="2">
    RICCARDOMERENDA.DEV
  </text>

  <text x="80" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#f8fafc">
    Building the infrastructure
  </text>
  <text x="80" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#f8fafc">
    between AI and data
  </text>

  <text x="80" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#94a3b8">
    Senior Software Engineer · AI Tooling · .NET · Python · Go
  </text>

  <!-- Bottom bar -->
  <rect x="80" y="540" width="60" height="4" rx="2" fill="#4f46e5"/>
  <rect x="152" y="540" width="40" height="4" rx="2" fill="#06b6d4"/>
  <rect x="204" y="540" width="30" height="4" rx="2" fill="#8b5cf6"/>
</svg>
